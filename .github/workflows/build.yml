name: Build & Publish

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  detect-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check version change
        id: check
        run: |
          set -euo pipefail
          NEW=$(jq -r .version haxelib.json)
          OLD=$(git show HEAD~1:haxelib.json 2>/dev/null | jq -r .version) || OLD="0.0.0"
          if [ "$NEW" != "$OLD" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD → $NEW"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $NEW"
          fi

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mac
            label: mac-x64
            runner: macos-15
            flags: "-64 -release"
            ndll_dir: Mac64
          - target: mac
            label: mac-arm64
            runner: macos-15
            flags: "-arm64 -release"
            ndll_dir: MacArm64
            haxe_extra: "-D HXCPP_ARM64"
          - target: windows
            runner: windows-latest
            flags: "-64 -release"
            ndll_dir: Windows64
            haxe_extra: "-D HXCPP_M64"
          - target: linux
            runner: ubuntu-latest
            flags: "-64 -release"
            ndll_dir: Linux64
            haxe_extra: "-D HXCPP_M64"
          - target: android
            runner: ubuntu-latest
            flags: "-release"
            ndll_dir: Android
          - target: ios
            runner: macos-15
            flags: "-release"
            ndll_dir: iPhone

    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.label || matrix.target }} (${{ matrix.runner }})

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.4

      - name: Cache haxelib
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: haxelib-${{ matrix.target }}-${{ hashFiles('haxelib.json') }}
          restore-keys: haxelib-${{ matrix.target }}-

      - name: Install Haxe dependencies
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp --quiet
          haxelib install lime --quiet
          haxelib dev extension-video-export .

      - name: Install libopenh264 (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libopenh264-dev

      - name: Setup Android NDK
        id: setup-ndk
        if: matrix.target == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26c

      - name: Setup JDK (Android)
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install hxcpp with NDK r26c support (Android)
        if: matrix.target == 'android'
        run: |
          curl -sL -o /tmp/hxcpp.zip https://github.com/HaxeFoundation/hxcpp/releases/download/v4.3.45/hxcpp-4.3.45.zip
          haxelib install /tmp/hxcpp.zip --quiet

      - name: Configure Lime for Android
        if: matrix.target == 'android'
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_SDK_ROOT
          haxelib run lime config ANDROID_NDK_ROOT ${{ steps.setup-ndk.outputs.ndk-path }}
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Build NDLL
        run: haxelib run lime rebuild . ${{ matrix.target }} ${{ matrix.flags }}

      - name: Compile functional test
        if: matrix.target != 'android' && matrix.target != 'ios'
        run: haxe test.hxml ${{ matrix.haxe_extra }}

      - name: Run functional test
        if: matrix.target != 'android' && matrix.target != 'ios'
        run: ./test/bin/TestEncode
        shell: bash

      - name: Upload NDLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.ndll_dir }}
          path: ndll/${{ matrix.ndll_dir }}/
          retention-days: 5

  publish:
    needs: [detect-release, build]
    runs-on: ubuntu-latest
    if: needs.detect-release.outputs.is_release == 'true'
    permissions:
      contents: write
    env:
      TAG: v${{ needs.detect-release.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.4

      - name: Download all NDLL artifacts
        uses: actions/download-artifact@v4
        with:
          path: ndll/

      - name: Show NDLL layout
        run: find ndll/ -type f | head -50

      - name: Create git tag
        run: |
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG"

      - name: Submit to haxelib
        run: |
          zip -r extension-video-export.zip . \
            -x ".git/**" -x ".github/**" -x "project/obj/**" \
            -x ".gitignore" -x ".clang-format" -x ".clang-format-ignore" \
            -x ".clang-tidy" -x ".clangd" -x ".editorconfig" -x "hxformat.json" \
            -x "test/**" -x "test.hxml"
          haxelib submit extension-video-export.zip ${{ secrets.HAXELIB_PASSWORD }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            extension-video-export.zip \
            --title "$TAG" \
            --generate-notes
